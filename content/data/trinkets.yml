trinkets:
  - brand: "M5Stack"
    name: "Stack-chan"
    image: "./static/images/stackchan-m5.png"
    description: "A tiny open-source robot that lives on your desk and actually moves. The expressive face reacts in real-time, servo-driven head tilts feel weirdly alive. Built on ESP32-S3 so you can hack it however you want—part pet, part conversation starter."
    link: "https://shop.m5stack.com/products/stackchan-kawaii-co-created-open-source-ai-desktop-robot"
    emoji: "&#129302;"
    release_date: "Jan 2026"
  - brand: "vivo"
    name: "X Fold5"
    image: "./static/images/xfold5-titanium.png"
    description: "Finally a foldable that doesn’t feel like a compromise. The titanium hinge is rock-solid, and at 4.6mm folded it slips into any pocket. Zeiss cameras are legit—the 50MP telephoto actually delivers. 6000mAh battery means I rarely think about charging."
    link: "https://www.vivo.com.cn/vivo/xfold5"
    emoji: "&#128241;"
    release_date: "Mar 2025"
  - brand: "Apple"
    name: "Mac mini M4"
    image: "./static/images/mac-mini-m4.png"
    description: "Tiny but mighty. Swapped my bulky tower for this little silver puck and never looked back. The M4 chip handles everything I throw at it—Figma, Xcode, even some light gaming. Dead silent too."
    link: "https://www.apple.com/mac-mini/"
    emoji: "&#128187;"
    release_date: "Nov 2024"
  - brand: "Huawei"
    name: "FreeClip 2"
    image: "./static/images/freeclip2-black.png"
    description: "Open-ear clip earbuds done right—barely 5.1g each, feels like wearing nothing. The dual-diaphragm driver delivers surprisingly punchy sound for an open design, and adaptive volume is a lifesaver on the subway. IP57 makes it my go-to for workouts too."
    link: "https://consumer.huawei.com/en/headphones/freeclip2/"
    emoji: "&#127911;"
    release_date: "Dec 2024"
